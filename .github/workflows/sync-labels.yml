name: Sync Labels

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: 'Target repos (space-separated, e.g. "andrewconnell/foo andrewconnell/bar")'
        required: true
        type: string
      prune:
        description: 'Delete labels not defined in labels.yml'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
    paths:
      - '.github/labels.yml'
      - '.github/workflows/sync-labels.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync labels
        uses: micnncim/action-label-syncer@v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        with:
          manifest: .github/labels.yml
          prune: ${{ inputs.prune || false }}
          repository: ${{ inputs.repositories || github.repository }}
